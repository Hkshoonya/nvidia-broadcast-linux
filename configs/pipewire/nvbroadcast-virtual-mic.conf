# PipeWire virtual microphone configuration for NVIDIA Broadcast
# Creates a virtual audio source that applications can use as a microphone
#
# Usage: pw-loopback --capture-props='media.class=Audio/Sink node.name=nvbroadcast_sink node.description="NVIDIA Broadcast Audio Input"' --playback-props='media.class=Audio/Source node.name=nvbroadcast_mic node.description="NVIDIA Broadcast Microphone"'
